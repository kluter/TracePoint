<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TracePoint</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="assets/site.webmanifest">
</head>
<body>
    <div id="app">
        <!-- LEFT: IMAGE -->
        <div id="image-panel">
            <div class="panel-header">
                <div class="brand">
                    <div class="logo-wrap"><img src="assets/logo.png" alt="TracePoint Logo" id="logo"></div>
                    <h1>TracePoint</h1>
                </div>
                <div class="toolbar" id="toolbar">
                    <button id="btn-add-line">+ New Line</button>
                    <button id="btn-mode-toggle" disabled>Mode: Idle</button>
                </div>
                <div class="navbar-right">
                    <button id="btn-horizon" title="Set horizon correction">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" y1="15" x2="20" y2="9"/>
                            <path d="M16 6 a7 7 0 0 1 4 4"/>
                            <polyline points="16 6 20 10 16 11"/>
                        </svg>
                        <span>Level</span>
                    </button>
                    <a id="btn-github" href="https://github.com/kluter/TracePoint" target="_blank" rel="noopener" title="View on GitHub">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                        </svg>
                    </a>
                </div>
            </div>
            <div id="image-container">
                <canvas id="image-canvas"></canvas>
                <div id="drop-overlay">Drop image here</div>
                <div id="zoom-hint">scroll to zoom · space+drag or middle-drag to pan</div>
            </div>
        </div>

        <!-- RIGHT: MAP -->
        <div id="map-panel">
            <div class="panel-header">
                <h3 style="margin:0; font-size:15px; font-weight:600;">Map View</h3>
                <div class="toolbar-hint">Place geo points → Rays appear → Intersection = Image origin</div>
            </div>
            <div id="map-container"></div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
