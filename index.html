<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TracePoint</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">

        <!-- LEFT: IMAGE -->
        <div id="image-panel">

            <div class="panel-header">
                Image View
            </div>

            <div id="image-container">

                <canvas id="image-canvas"></canvas>

                <div id="drop-overlay">
                    Drop image here
                </div>

            </div>

        </div>

        <!-- RIGHT: MAP -->
        <div id="map-panel">

            <div class="panel-header">
                Map View
            </div>

            <div id="map-container">
                <p style="padding: 10px;">Map will be added next step</p>
            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
